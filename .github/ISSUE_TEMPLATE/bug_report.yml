name: Bug report
description: Report a bug together with a one-command reproducer.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide a one-command reproducer generated by `scripts/make_lit_error.sh` or `scripts/make_gtest_error.sh`.
  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Paste the exact one-command reproducer here.
      placeholder: ./scripts/checkout.sh <remote> <commit> && ./scripts/probe.sh foo.mim
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
